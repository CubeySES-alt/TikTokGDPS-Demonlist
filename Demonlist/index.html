<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok GDPS Demonlist</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>

    <div class="title">
        <img src="images/logo.png" class="logo">
        <h1>TikTok GDPS Demonlist</h1>
    </div>

    <div class="searchArea">
        <input
            type="text"
            id="search"
            placeholder="Search levels..."
        >
    </div>

</header>

<div class="stats">

    <div class="statBox">
        <span id="levelCount">0</span>
        <p>Levels</p>
    </div>

    <div class="statBox">
        <span id="creatorCount">0</span>
        <p>Creators</p>
    </div>

    <div class="statBox">
        <span id="verifierCount">0</span>
        <p>Verifiers</p>
    </div>

</div>

<main>

    <div id="levelContainer"></div>

</main>

<footer>

Page Made by JustCubey (dont edit this!) 

</footer>

<script src="script.js"></script>

</body>
</html>
